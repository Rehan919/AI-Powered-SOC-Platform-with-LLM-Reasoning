version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinelforge
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinelforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/chroma/chroma

  llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: ["-m", "/models/phi-3-mini-4k-instruct.Q4_K_M.gguf", "--host", "0.0.0.0", "--port", "8080", "-c", "2048", "--parallel", "1", "--cache-ram", "0", "--no-warmup"]

  backend:
    build: ./backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  wazuh-webhook:
    build: ./backend
    command: ["uvicorn", "src.webhook.receiver:app", "--host", "0.0.0.0", "--port", "9090"]
    ports:
      - "9090:9090"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  chromadata:
